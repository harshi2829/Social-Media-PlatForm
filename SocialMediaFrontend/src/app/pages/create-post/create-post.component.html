<div class="min-h-screen bg-purple-50 flex items-center justify-center p-6">

  <!-- Card -->
  <div class="bg-white w-[520px] rounded-2xl shadow-xl border border-gray-200 p-6">

    <!-- Heading -->
    <h2 class="text-3xl font-bold text-gray-800 mb-5">
      Create Post
    </h2>

    <!-- Upload Box -->
    <div class="flex items-center justify-center w-full">

      <label
        for="dropzone-file"
        class="flex flex-col items-center justify-center w-full h-64
               bg-gray-50 border-2 border-dashed border-gray-300
               rounded-xl cursor-pointer hover:bg-purple-50
               transition-all duration-300">

        <div class="flex flex-col items-center justify-center pt-5 pb-6 text-gray-600">

          <!-- Icon -->
          <svg
            class="w-10 h-10 mb-3 text-gray-500"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">

            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 16v-8m0 0l-3 3m3-3l3 3M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1"/>

          </svg>

          <!-- Text -->
          <p class="mb-1 text-sm">
            <span class="font-semibold text-purple-600">
              Click to upload
            </span>
            or drag & drop
          </p>

          <p class="text-xs text-gray-500">
            PNG, JPG, GIF
          </p>

          <!-- Loading -->
          <p *ngIf="loading" class="text-purple-600 mt-2 text-sm">
            Uploading...
          </p>

        </div>

        <!-- File Input -->
        <input
          id="dropzone-file"
          type="file"
          class="hidden"
          (change)="uploadImage($event)" />

      </label>

    </div>

    <!-- Image Preview -->
    <div *ngIf="image" class="mt-5">

      <img
        [src]="image"
        class="w-full h-56 object-cover rounded-xl shadow-md">

    </div>

    <!-- Title Input -->
    <input
      type="text"
      [(ngModel)]="title"
      placeholder="Enter title"
      class="mt-5 w-full border border-gray-300 rounded-lg p-3
             outline-none focus:ring-2 focus:ring-purple-400" />

    <!-- Description -->
    <textarea
      [(ngModel)]="description"
      rows="4"
      placeholder="Write description..."
      class="mt-4 w-full border border-gray-300 rounded-lg p-3
             outline-none focus:ring-2 focus:ring-purple-400 resize-none">
    </textarea>

    <!-- Post Button -->
    <button
      (click)="createPost()"
      [disabled]="loading"
      class="mt-5 w-full bg-purple-600 text-white py-3 rounded-lg
             hover:bg-purple-700 transition-all duration-300">

      {{ loading ? 'Uploading...' : 'Post' }}

    </button>

  </div>

</div>
