<div class="min-h-screen bg-gradient-to-br from-purple-100 via-pink-50 to-purple-200 py-10">

  <div class="max-w-3xl mx-auto px-4">

    <div
      *ngFor="let post of posts"
      class="bg-white rounded-3xl shadow-lg overflow-hidden mb-8 hover:shadow-2xl transition-all duration-300">

      <!-- Image -->
      <div class="overflow-hidden">
        <img
          [src]="post.image"
          alt="Post Image"
          class="w-full h-[400px] object-cover hover:scale-105 transition duration-500">
      </div>

      <!-- Content -->
      <div class="p-6">

        <!-- VIEW MODE -->
        <div *ngIf="editingId !== post.Id">

          <div class="flex justify-between items-start">

            <h2 class="text-3xl font-bold text-gray-800">
              {{ post.title }}
            </h2>

           

          </div>

          <p class="text-gray-600 mt-4 leading-relaxed text-lg">
            {{ post.description }}
          </p>

          <!-- Actions -->
          <div class="flex gap-3 mt-6">

            <button
              (click)="likePost(post)"
              class="bg-pink-500 hover:bg-pink-600 text-white px-5 py-2 rounded-xl shadow-md transition">

              ❤️ {{ post.like || 0 }}

            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
