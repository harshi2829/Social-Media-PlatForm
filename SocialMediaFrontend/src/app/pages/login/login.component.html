<div class="min-h-screen bg-gradient-to-br from-purple-600 via-violet-500 to-pink-500 flex items-center justify-center p-6">

  <div class="w-full max-w-6xl bg-white rounded-3xl shadow-2xl overflow-hidden">

    <div class="grid md:grid-cols-2">

      <!-- LEFT SIDE -->
      <div class="hidden md:flex flex-col justify-center items-center bg-gradient-to-br from-violet-600 to-purple-700 p-10 text-white">

        <div class="w-32 h-32 rounded-full bg-white/20 flex items-center justify-center mb-8">

          <svg xmlns="http://www.w3.org/2000/svg"
               fill="none"
               viewBox="0 0 24 24"
               stroke-width="1.5"
               stroke="currentColor"
               class="w-16 h-16">

            <path stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15.75 6.75a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25a7.5 7.5 0 0115 0" />

          </svg>

        </div>
        <h1 class="text-4xl font-bold mb-4">
          SocialHub
        </h1>

        <p class="text-center text-purple-100 text-lg">
          Connect, share memories and interact with your friends.
        </p>

      </div>

      <!-- RIGHT SIDE -->
      <div class="p-10 md:p-14">

        <div class="text-center mb-8">

          <div
            class="w-16 h-16 mx-auto rounded-full bg-violet-100 flex items-center justify-center mb-4">

            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-8 h-8 text-violet-600"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor">

              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5.121 17.804A9 9 0 1118.879 17.804"/>

            </svg>

          </div>

          <h2 class="text-3xl font-bold text-gray-800">
            Welcome Back 👋
          </h2>

          <p class="text-gray-500 mt-2">
            Login to continue your journey
          </p>

        </div>

        <form class="space-y-5">

          <!-- EMAIL -->
          <div>

            <label class="block text-gray-700 mb-2 font-medium">
              Email
            </label>

            <input
              type="email"
              name="email"
              [(ngModel)]="myLogObj.email"
              placeholder="Enter your email"
              class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-violet-500">

          </div>

          <!-- PASSWORD -->
          <div>

            <label class="block text-gray-700 mb-2 font-medium">
              Password
            </label>

            <input
              type="password"
              name="password"
              [(ngModel)]="myLogObj.password"
              placeholder="Enter your password"
              class="w-full px-4 py-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-violet-500">

          </div>

          <!-- LOGIN BUTTON -->
          <button
            type="button"
            (click)="onLog()"
            class="w-full bg-gradient-to-r from-violet-600 to-purple-600 text-white py-4 rounded-xl font-semibold hover:scale-[1.02] transition duration-300 shadow-lg">

            Login

          </button>

        </form>

        <!-- REGISTER LINK -->
        <p class="mt-8 text-center text-gray-600 ">

          Don't have an account?

          <a
            href="/register"
            class="text-violet-600 font-semibold hover:underline px-4">

            Register

          </a>

        </p>

      </div>

    </div>

  </div>

</div>
